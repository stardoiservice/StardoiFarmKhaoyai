<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found | Stardoi Sheep Farm</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="icon" type="image/jpeg" href="images/logo.jpg">
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: 'Prompt', 'Outfit', sans-serif;
      background: linear-gradient(135deg, #eef9f2 0%, #e2f4e9 50%, #d5eedf 100%);
      background-attachment: fixed;
      color: #1c3125;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 40px 20px;
    }
    .sheep-emoji {
      font-size: 6rem;
      animation: bounceSheep 2s infinite ease-in-out;
      margin-bottom: 20px;
    }
    h1 {
      font-family: 'Outfit', 'Prompt', sans-serif;
      font-size: clamp(3rem, 8vw, 6rem);
      font-weight: 800;
      color: #2b6a4a;
      line-height: 1;
      margin-bottom: 10px;
    }
    h2 {
      font-family: 'Outfit', 'Prompt', sans-serif;
      font-size: clamp(1.2rem, 3vw, 1.8rem);
      font-weight: 600;
      color: #4e6557;
      margin-bottom: 10px;
    }
    p {
      font-size: 1rem;
      color: #4e6557;
      margin-bottom: 30px;
      max-width: 500px;
      line-height: 1.7;
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 36px;
      background-color: #2b6a4a;
      color: white;
      font-weight: 600;
      border-radius: 50px;
      text-decoration: none;
      font-size: 1rem;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), background-color 0.3s ease, box-shadow 0.3s ease;
    }
    .back-link:hover {
      background-color: #1e4c34;
      transform: translateY(-4px) scale(1.02);
      box-shadow: 0 10px 25px rgba(43, 106, 74, 0.3), 0 8px 15px rgba(0,0,0,0.1);
    }
    .back-link:active {
      transform: translateY(0) scale(0.98);
    }
    @keyframes bounceSheep {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-12px) rotate(5deg); }
    }
  </style>
</head>
<body>
  <div class="sheep-emoji">🐑</div>
  <h1>404</h1>
  <h2>ไม่พบหน้าที่คุณต้องการ</h2>
  <p>Page Not Found — ขออภัย หน้านี้อาจถูกย้ายหรือไม่มีอยู่แล้ว น้องแกะพาคุณกลับหน้าหลักได้เลย!</p>
  <a href="index.html" class="back-link">🏠 กลับหน้าหลัก / Back to Home</a>
</body>
</html>
